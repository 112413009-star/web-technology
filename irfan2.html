<!DOCTYPE html>
<html>
<head>
    <title>Attendance Form</title>
</head>
<body>

<h3>Attendance Registration</h3>

<form>
    Name:
    <input type="text"><br><br>

    Department:
    <select>
        <option>CSE</option>
        <option>ECE</option>
    </select><br><br>

    Subjects:
    <select multiple>
        <option>HTML</option>
        <option>CSS</option>
        <option>Java</option>
    </select><br><br>

    Address:<br>
    <textarea rows="3" cols="20"></textarea><br><br>

    <input type="checkbox"> Present<br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
</form>

</body>
</html>
